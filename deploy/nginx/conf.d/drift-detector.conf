server {
    listen 80;
    server_name terraformdriftdevansh.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name terraformdriftdevansh.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/terraformdriftdevansh.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terraformdriftdevansh.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass http://drift-detector:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}